# ==========================================
# CORE CONFIG: NaxRiscV (64-bit)
# ==========================================

cpu_type: "naxriscv"
cpu_variant: "standard"

# Flags de síntese exclusivas deste processador
core_flags:
  - "--with-fpu"
  - "--with-rvc"
  - "--xlen=64"
  - "--cpu-count=2"

# Requisitos mínimos de hardware para este core fazer boot do Linux
requirements:
  min_ram_mb: 32
  needs_opensbi: true