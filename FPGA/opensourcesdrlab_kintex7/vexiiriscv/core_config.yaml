# ==========================================
# CORE CONFIG: VexiiRISC-V (64-bit)
# ==========================================

cpu_type: "vexiiriscv"
cpu_variant: "debian"

# Flags de síntese exclusivas deste processador
core_flags:
  - "--cpu-count=2"

# Requisitos mínimos de hardware para este core fazer boot do Linux
requirements:
  min_ram_mb: 32
  needs_opensbi: true