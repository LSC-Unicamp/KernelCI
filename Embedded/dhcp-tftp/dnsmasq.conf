# Ajuste para a interface da rede isolada do lab
interface=eno2
bind-interfaces
log-dhcp

# DHCP da rede do lab
# gateway opcional; use 0.0.0.0 se a rede for isolada sem roteamento
dhcp-range=192.168.50.100,192.168.50.199,12h
dhcp-option=option:router,192.168.50.1
dhcp-option=option:dns-server,192.168.50.1

# TFTP
enable-tftp
tftp-root=/srv/tftp

# Exemplo: controle por MAC
# Cada placa recebe IP fixo e script/config diferente
dhcp-host=aa:bb:cc:dd:ee:01,board1,192.168.50.11,set:board1
dhcp-host=aa:bb:cc:dd:ee:02,board2,192.168.50.12,set:board2

dhcp-boot=tag:board1,boards/board1/boot.scr
dhcp-boot=tag:board2,boards/board2/boot.scr

# Fallback genérico
pxe-service=tag:!board1,tag:!board2,riscv64-efi,"PXE default",pxelinux.0
